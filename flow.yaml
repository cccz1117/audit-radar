pipeline:
  name: "audit-daily-v2"
  version: "1.0.0"
  description: "Flow Engineering 驱动的审计日报工作流"

  nodes:
    # ========== 1. 采集 ==========
    - id: fetch
      type: code
      module: core.fetcher
      function: Fetcher.fetch_all
      output: candidates

    # ========== 2. 粗筛 ==========
    - id: screen
      type: llm
      model: deepseek-v4-flash
      system_prompt: prompts/selector_system.txt
      input: |
        候选新闻列表（共 ${fetch} 条）：
        ${fetch}
      output: screened
      output_parser: json
      temperature: 0.3
      max_tokens: 8192

    # ========== 3. 共振 ==========
    - id: resonance
      type: code
      module: core.resonance
      function: ResonanceDetector.detect
      input: ${screen}
      output: clusters

    # ========== 4. 精排（用推理模型，输出思维链） ==========
    - id: rank
      type: llm
      model: deepseek-r1
      system_prompt: prompts/ranker_system.txt
      input: |
        候选事件簇（已通过共振验证）：
        ${resonance}
      output: ranked
      temperature: 0.3
      max_tokens: 8192

    # ========== 5. 生成 ==========
    - id: generate
      type: llm
      model: deepseek-v4
      system_prompt: prompts/generator_system.txt
      input: |
        Top3 排序结果：
        ${ranked}

        完整事件簇素材：
        ${resonance}
      output: html
      temperature: 0.5
      max_tokens: 8192

    # ========== 6. 发送 ==========
    - id: send
      type: code
      module: core.sender
      function: Sender.send
      input: ${generate}
      output: sent
