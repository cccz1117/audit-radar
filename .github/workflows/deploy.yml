name: Deploy to Alibaba Cloud FC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aliyun CLI
        run: |
          curl -O https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          chmod +x aliyun
          sudo mv aliyun /usr/local/bin/

      - name: Configure Aliyun CLI
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id ${{ secrets.ALICLOUD_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALICLOUD_ACCESS_KEY_SECRET }} \
            --region ${{ secrets.ALICLOUD_REGION || 'cn-hangzhou' }}

      - name: Zip Code
        run: |
          zip -r code.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.pyc" \
            -x "__pycache__/*"

      - name: Deploy to FC
        run: |
          aliyun fc-open UpdateFunction \
            --service-name audit-radar \
            --function-name daily-job \
            --runtime python3.11 \
            --handler index.handler \
            --code file://code.zip \
            --memory-size 512 \
            --timeout 300 \
            --environment-variables \
              "DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }},MODEL_NAME=${{ secrets.MODEL_NAME || 'deepseek-v4-flash' }},MAIL_HOST=${{ secrets.MAIL_HOST }},MAIL_PORT=${{ secrets.MAIL_PORT || '587' }},MAIL_USER=${{ secrets.MAIL_USER }},MAIL_PASS=${{ secrets.MAIL_PASS }},MAIL_TO_LIST=${{ secrets.MAIL_TO_LIST }},MAIL_FROM=${{ secrets.MAIL_FROM || secrets.MAIL_USER }}"
